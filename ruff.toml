# Lint config for the integration + its bundled library. Only the borrowed Tuya BLE
# transport under _vendor/ is excluded - it's third-party code kept close to upstream.
target-version = "py312"
line-length = 88
extend-exclude = ["custom_components/tuya_eboard/tuya_eboard_ble/_vendor"]

[lint]
select = ["E", "F", "W", "I", "UP", "B"]
