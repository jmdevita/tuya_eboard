# Lint config for the HA integration glue code. The vendored library
# (custom_components/tuya_eboard/tuya_eboard_ble) is a mirror of the root package and is
# linted/tested there, so it's excluded here.
target-version = "py312"
line-length = 88
extend-exclude = ["custom_components/tuya_eboard/tuya_eboard_ble"]

[lint]
select = ["E", "F", "W", "I", "UP", "B"]
