name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release_zip:
    name: Build release asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set manifest version to the release tag
        run: |
          python3 "${{ github.workspace }}/.github/scripts/update_hacs_manifest.py" \
            --version "${{ github.ref_name }}"

      - name: Create zip
        run: |
          cd custom_components/tuya_eboard
          zip -r "${{ github.workspace }}/tuya_eboard.zip" . -x '*.zip' '*/__pycache__/*'

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: tuya_eboard.zip
