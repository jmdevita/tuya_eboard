name: Release

# A user-pushed tag triggers this (tag pushes aren't subject to the GITHUB_TOKEN
# "don't trigger other workflows" rule), so we do everything in one job: stamp the
# manifest version from the tag, build the HACS zip, and publish the release with it.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Stamp manifest version from the tag
        run: |
          python3 "${{ github.workspace }}/.github/scripts/update_hacs_manifest.py" \
            --version "${{ github.ref_name }}"

      - name: Build the HACS zip
        run: |
          cd custom_components/tuya_eboard
          zip -r "${{ github.workspace }}/tuya_eboard.zip" . -x '*.zip' '*/__pycache__/*'

      - name: Publish release with the zip asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          files: tuya_eboard.zip
