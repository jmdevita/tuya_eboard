name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Features"
    labels: ["feature", "enhancement"]
  - title: "Bug Fixes"
    labels: ["fix", "bugfix", "bug"]
  - title: "Maintenance"
    labels: ["chore", "ci", "docs", "refactor"]
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["minor", "feature", "enhancement"]
  patch:
    labels: ["patch", "fix", "bugfix", "bug", "chore", "ci", "docs"]
  default: patch
autolabeler:
  - label: "docs"
    files: ["**/*.md"]
  - label: "ci"
    files: [".github/**"]
  - label: "fix"
    title: ["/^fix/i"]
  - label: "feature"
    title: ["/^feat/i"]
template: |
  ## Changes

  $CHANGES
